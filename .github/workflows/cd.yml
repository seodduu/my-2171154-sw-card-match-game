name: CD

# ─────────────────────────────────────────────────────────
# CD 파이프라인 (CI 완료 후 실행)
# ─────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# workflow_run에서도 권한이 일관되게 적용되도록 최상단에 선언
permissions:
  contents: read
  packages: write

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  docker-build-push:
    name: Docker Build and Push to GHCR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (CI가 성공한 커밋 고정)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Debug identity
        run: |
          echo "actor=$GITHUB_ACTOR"
          echo "repo=$GITHUB_REPOSITORY"
          echo "owner=$GITHUB_REPOSITORY_OWNER"

      - name: Set image names (owner 소문자 고정)
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "FRONT_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/card-match-game/frontend" >> $GITHUB_ENV
          echo "BACK_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/card-match-game/backend" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONT_IMAGE }}:sha-${{ github.event.workflow_run.head_sha }}
            ${{ env.FRONT_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACK_IMAGE }}:sha-${{ github.event.workflow_run.head_sha }}
            ${{ env.BACK_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Summary (Build & Push)
        if: always()
        run: |
          echo "## Docker Build & Push 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.event.workflow_run.head_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ env.FRONT_IMAGE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ env.BACK_IMAGE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  container-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout (CI가 성공한 커밋 고정)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image names (owner 소문자 고정)
        run: |
          echo "FRONT_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/card-match-game/frontend" >> $GITHUB_ENV
          echo "BACK_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/card-match-game/backend" >> $GITHUB_ENV

      - name: Login to GHCR (PAT, private 이미지 pull 대비)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Trivy Scan - Frontend (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.FRONT_IMAGE }}:sha-${{ github.event.workflow_run.head_sha }}'
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Trivy Scan - Backend (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.BACK_IMAGE }}:sha-${{ github.event.workflow_run.head_sha }}'
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Summary (Trivy)
        if: always()
        run: |
          echo "## Trivy 스캔 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 | 기준 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | CRITICAL | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | CRITICAL | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  e2e:
    name: E2E Tests (Playwright — Self-Contained)
    runs-on: ubuntu-latest
    needs: [container-scan]

    steps:
      - name: Checkout (CI가 성공한 커밋 고정)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js — Backend
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps — Backend
        run: npm ci
        working-directory: backend

      - name: Setup Node.js — Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps — Frontend
        run: npm ci
        working-directory: frontend

      - name: Setup Node.js — E2E
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install deps — E2E
        run: npm ci
        working-directory: e2e

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run E2E
        run: npx playwright test
        working-directory: e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.event.workflow_run.head_sha }}
          path: e2e/playwright-report/
          retention-days: 7

      - name: Summary (E2E)
        if: always()
        run: |
          echo "## E2E 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.event.workflow_run.head_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  pages-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [e2e]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (CI가 성공한 커밋 고정)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js — Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps — Frontend
        run: npm ci
        working-directory: frontend

      - name: Configure Pages (get base_path)
        uses: actions/configure-pages@v5
        id: pages

      - name: Build Frontend for Pages (with base path)
        run: npx tsc -b && npx vite build --base="${{ steps.pages.outputs.base_path }}"
        working-directory: frontend

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Summary (Pages)
        if: always()
        run: |
          echo "## Pages 배포 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.event.workflow_run.head_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    name: Smoke Test (GitHub Pages 생존 확인)
    runs-on: ubuntu-latest
    needs: [pages-deploy]

    steps:
      - name: Smoke Test (curl with retries)
        run: |
          PAGE_URL="${{ needs.pages-deploy.outputs.page_url }}"
          echo "Smoke Test 대상 URL: $PAGE_URL"
          curl -sSf \
            --retry 5 \
            --retry-delay 10 \
            --retry-connrefused \
            --max-time 30 \
            "$PAGE_URL"
          echo "Smoke Test 통과: $PAGE_URL 에서 HTTP 200 응답 수신"

      - name: Summary (Smoke Test)
        if: always()
        run: |
          echo "## Smoke Test 결과" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ needs.pages-deploy.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
